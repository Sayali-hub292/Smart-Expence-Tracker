<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- html2pdf.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div class="container" id="project-report">
        <nav class="top-nav no-print">
            <button id="language-toggle" class="toggle-btn">
                <span id="lang-text">Marathi</span>
            </button>
            <button id="theme-toggle" class="toggle-btn">
                <span id="theme-icon">🌙</span>
            </button>
        </nav>
        <header>
            <h1 id="main-title">Smart Expense Tracker</h1>
            <p id="main-subtitle">Track your daily spends and manage your monthly budget.</p>
        </header>

        <main>
            <section class="dashboard card">
                <div class="budget-input no-print">
                    <label for="monthly-budget" id="label-budget">Monthly Budget (₹)</label>
                    <div class="input-group">
                        <input type="number" id="monthly-budget" placeholder="Enter budget" value="0">
                        <button id="set-budget-btn">Set</button>
                    </div>
                </div>
                <!-- Saving Plan Box -->
                <div id="saving-plan" class="saving-plan-box hidden no-print">
                    <h3 id="plan-title">💡 Saving Plan</h3>
                    <p id="plan-text"></p>
                </div>
                <div class="stats">
                    <div class="stat-item budget">
                        <span class="label" id="stat-budget">Total Budget</span>
                        <span class="value" id="total-budget-display">₹0</span>
                    </div>
                    <div class="stat-item spent">
                        <span class="label" id="stat-spent">Total Spent</span>
                        <span class="value" id="total-spent-display">₹0</span>
                    </div>
                    <div class="stat-item remaining" id="remaining-container">
                        <span class="label" id="stat-remaining">Remaining</span>
                        <span class="value" id="remaining-budget-display">₹0</span>
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="budget-progress"></div>
                </div>
                <div id="budget-warning" class="warning-alert hidden">
                    ⚠ Warning: You have exceeded your budget!
                </div>
            </section>

            <section class="add-expense card no-print">
                <h2 id="heading-add">Add New Expense</h2>
                <form id="expense-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="expense-date" id="label-date">Date</label>
                            <input type="date" id="expense-date" required>
                        </div>
                        <div class="form-group">
                            <label for="expense-amount" id="label-amount">Amount (₹)</label>
                            <input type="number" id="expense-amount" placeholder="0" required min="0">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="expense-category" id="label-category">Category</label>
                            <input type="text" id="expense-category" list="category-list"
                                placeholder="Type or select..." required>
                            <datalist id="category-list">
                                <option value="Food" id="opt-food"></option>
                                <option value="Travel" id="opt-travel"></option>
                                <option value="Shopping" id="opt-shopping"></option>
                                <option value="Other" id="opt-other"></option>
                            </datalist>
                        </div>
                        <div class="form-group">
                            <label for="expense-note" id="label-note">Note</label>
                            <input type="text" id="expense-note" placeholder="What's this for?">
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="btn-add">Add Expense</button>
                </form>
            </section>

            <section class="expense-history card" id="history-section">
                <div class="history-header">
                    <h2 id="heading-history">Expense History</h2>
                    <div class="actions">
                        <button class="btn-secondary no-print" onclick="resetForm()">+ Add New</button>
                        <button id="export-json-btn" class="btn-secondary no-print">Export Data</button>
                        <button id="import-json-btn" class="btn-secondary no-print">Import Data</button>
                        <input type="file" id="import-file" accept=".json" class="hidden">
                        <button id="download-pdf-btn" class="pdf-btn">Download PDF Report</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="expense-table">
                        <thead>
                            <tr>
                                <th id="th-date">Date</th>
                                <th id="th-category">Category</th>
                                <th id="th-note">Note</th>
                                <th id="th-amount">Amount</th>
                                <th class="no-print" id="th-action">Action</th>
                            </tr>
                        </thead>
                        <tbody id="expense-list">
                            <!-- Expenses will be added here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
